---
layout: default
permalink: /admin/
title: 관리
sitemap: false
---
<section id="admin-root">
  <div class="section-title-row"><h2 id="admin-title">관리자</h2></div>
  <div id="admin-body"></div>
</section>
<script>
  // Jekyll이 빌드 시 글 메타데이터를 심어줍니다
  const POSTS_META = [
    {% for post in site.posts %}
    {
      "path": {{ post.path | jsonify }},
      "date": {{ post.date | date: "%Y.%m.%d" | jsonify }},
      "title": {{ post.title | jsonify }},
      "cat": {{ post.categories | first | jsonify }},
      "tags": {{ post.tags | jsonify }},
      "summary": {{ post.summary | strip | jsonify }}
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];
  const CATEGORIES = [
    {% for group in site.data.groups %}{% for sub in group.subs %}{{ sub | jsonify }},{% endfor %}{% endfor %}
  ];
</script>
<script src="{{ '/assets/js/admin.js' | relative_url }}"></script>
