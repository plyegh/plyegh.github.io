title: 나만의 공부 블로그
description: 클라우드와 보안을 공부하며, 배운 것을 기록합니다.
url: https://plyegh.github.io
baseurl: ""

markdown: kramdown

# 글(_posts)은 개별 페이지를 만들지 않고 posts.json 데이터로만 사용합니다
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: null

exclude:
  - README.md
  - LICENSE
  - Gemfile
  - Gemfile.lock
  - vendor
